services:
  backend:
    container_name: mc-server-mng-backend
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - /opt/playit:/opt/playit:ro
      - /run/playit:/host/run/playit:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "${MINECRAFT_PORT:-25565}:25565"

  frontend:
    container_name: mc-server-mng-frontend
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes: {}
