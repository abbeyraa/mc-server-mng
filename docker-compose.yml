version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      - redis
    ports:
      - "8000:8000"
    # Java needs access to run Minecraft; mount server jars if needed
    privileged: false

  celery_worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

volumes: {}
